<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ARR - Dénombrement</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --accent:#6366f1; --green:#22c55e;
    --red:#ef4444; --text:#f1f5f9; --muted:#94a3b8;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{height:100%; font-family:'Segoe UI',Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); overflow:hidden;}
  #app{display:flex; flex-direction:column; height:100%;}

  header{
    padding:14px 20px; background:linear-gradient(135deg,#312e81,#1e1b4b);
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;
    box-shadow:0 2px 10px rgba(0,0,0,.3); z-index:10;
  }
  header .left{display:flex; align-items:center; gap:12px;}
  header .left img{height:42px; width:42px; object-fit:contain; border-radius:8px; background:#fff; padding:3px;}
  header h1{font-size:1.1rem; font-weight:600;}
  header .sub{font-size:.75rem; color:var(--muted);}
  .total-badge{background:var(--accent); padding:8px 18px; border-radius:14px; font-size:1.4rem; font-weight:700; line-height:1; text-align:center;}
  .total-badge span{display:block; font-size:.65rem; font-weight:400; color:#e0e7ff; margin-top:2px;}

  main{flex:1; display:grid; grid-template-columns:repeat(2,1fr); gap:14px; padding:14px; overflow:auto;}
  @media(min-width:700px){ main{grid-template-columns:repeat(3,1fr);} }

  .cat-card{
    background:var(--card); border-radius:18px; padding:18px;
    display:flex; flex-direction:column; align-items:center; justify-content:space-between;
    border:2px solid transparent; transition:.15s; cursor:pointer; position:relative; min-height:160px;
  }
  .cat-card:active{transform:scale(.96); border-color:var(--accent);}
  .cat-card .icon{margin-bottom:6px;}
  .cat-card .icon img{width:85px; height:85px; border-radius:50%; object-fit:cover; border:3px solid #6366f1;}
  .cat-card .actions{position:absolute; top:8px; right:8px; display:flex; gap:6px;}
  .cat-card .minus,.cat-card .edit{
    width:34px; height:34px; border-radius:50%;
    font-size:1.3rem; font-weight:700;
    display:flex; align-items:center; justify-content:center; border:none;
  }
  .cat-card .minus{background:#334155; color:var(--red);}
  .cat-card .minus:active{background:var(--red); color:#fff;}
  .cat-card .edit{background:#334155; color:var(--accent); font-size:1rem;}
  .cat-card .edit:active{background:var(--accent); color:#fff;}
  .cat-card .label{font-size:1rem; font-weight:600; text-align:center; margin-bottom:8px;}
  .cat-card .count{font-size:2.6rem; font-weight:800; color:var(--accent); line-height:1;}

  footer{padding:10px 16px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; background:#111827; border-top:1px solid #1f2937;}
  .btn{flex:1; min-width:120px; max-width:220px; padding:14px; border-radius:12px; border:none; font-size:.9rem; font-weight:600; background:#334155; color:var(--text); cursor:pointer;}
  .btn.danger{background:var(--red);}
  .btn.success{background:var(--green); color:#06210f;}
  .btn:active{opacity:.7;}

  #toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(100px);
    background:var(--green); color:#06210f; padding:12px 24px; border-radius:30px;
    font-weight:700; opacity:0; transition:.25s; z-index:50; font-size:1.5rem; box-shadow:0 4px 20px rgba(0,0,0,.4);
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:100; padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--card); border-radius:16px; padding:24px; max-width:420px; width:100%; max-height:85vh; overflow:auto;}
  .modal h2{margin-bottom:14px; font-size:1.1rem;}
  .modal p{color:var(--muted); font-size:.85rem; margin-bottom:10px; line-height:1.4;}
  .modal label{display:block; margin:10px 0 4px; font-size:.85rem; color:var(--muted);}
  .modal input,.modal select,.modal textarea{
    width:100%; padding:10px; border-radius:8px; border:1px solid #334155;
    background:#0f172a; color:var(--text); font-size:1rem; font-family:inherit;
  }
  .modal textarea{resize:vertical; min-height:80px;}
  .modal-actions{display:flex; gap:10px; margin-top:18px;}
  .modal-actions .btn{padding:12px;}

  .recap-row{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #334155; font-size:.95rem;}
  .recap-row b{color:var(--accent);}
  .recap-total{display:flex; justify-content:space-between; padding:14px 0 4px; font-size:1.2rem; font-weight:800;}

  #connStatus{position:fixed; top:6px; right:10px; width:10px; height:10px; border-radius:50%; background:var(--red); z-index:60;}
  #connStatus.online{background:var(--green);}

  #setupScreen{position:fixed; inset:0; background:var(--bg); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px;}
  #setupScreen .box{background:var(--card); padding:28px; border-radius:16px; max-width:380px; width:100%; text-align:center;}
  #setupScreen h2{margin-bottom:6px;}
  #setupScreen p{color:var(--muted); font-size:.85rem; margin-bottom:14px;}
  #setupScreen .date-display{font-size:1.3rem; font-weight:700; color:var(--accent); margin-bottom:18px; text-transform:capitalize;}

  .status-pill{display:inline-block; padding:4px 12px; border-radius:20px; font-size:.7rem; font-weight:700; margin-top:4px;}
  .status-pill.open{background:#14532d; color:var(--green);}
  .status-pill.closed{background:#450a0a; color:var(--red);}
</style>
</head>
<body>

<div id="connStatus"></div>

<!-- SETUP SCREEN -->
<div id="setupScreen">
  <div class="box">
    <img id="setupLogo" src="" alt="Logo ARR" style="width:80px; height:80px; object-fit:contain; border-radius:12px; background:#fff; padding:6px; margin-bottom:10px;">
    <h2>ARR - Dénombrement</h2>
    <div class="date-display" id="todayDate"></div>
    <p>Identifie ton poste d'accueil avant de commencer.</p>
    <input id="postName" placeholder="Ex: Porte principale - Jean" style="margin-bottom:14px;">
    <div id="sessionStatus" style="margin-bottom:14px; font-size:.85rem; color:var(--muted);">Vérification...</div>
    <button class="btn success" id="actionBtn" onclick="handleMainAction()" style="width:100%;">Patienter...</button>
  </div>
</div>

<div id="app" style="display:none;">
  <header>
    <div class="left">
      <img id="headerLogo" src="" alt="Logo ARR">
      <div>
        <h1 id="serviceTitle">Culte du —</h1>
        <div class="sub" id="postLabel"></div>
      </div>
    </div>
    <div class="total-badge">
      <span>TOTAL DU JOUR</span>
      <div id="grandTotal">0</div>
    </div>
  </header>

  <!-- ONGLETS -->
  <div id="tabBar" style="display:flex; background:#111827; border-bottom:2px solid #1f2937;">
    <button id="tab-culte" onclick="switchTab('culte')" style="flex:1; padding:14px; border:none; font-size:.95rem; font-weight:700; cursor:pointer; background:#6366f1; color:#fff; border-radius:0;">
      ⛪ Culte Principal
    </button>
    <button id="tab-ecole" onclick="switchTab('ecole')" style="flex:1; padding:14px; border:none; font-size:.95rem; font-weight:700; cursor:pointer; background:#1e293b; color:#94a3b8; border-radius:0;">
      📚 École du Dimanche
    </button>
  </div>

  <!-- TOTAUX PAR ONGLET -->
  <div style="display:flex; gap:10px; padding:10px 14px; background:#111827;">
    <div style="flex:1; background:#1e293b; border-radius:10px; padding:8px 12px; text-align:center;">
      <div style="font-size:.7rem; color:#94a3b8;">CULTE PRINCIPAL</div>
      <div id="totalCulte" style="font-size:1.4rem; font-weight:800; color:#6366f1;">0</div>
    </div>
    <div style="flex:1; background:#1e293b; border-radius:10px; padding:8px 12px; text-align:center;">
      <div style="font-size:.7rem; color:#94a3b8;">ÉCOLE DU DIMANCHE</div>
      <div id="totalEcole" style="font-size:1.4rem; font-weight:800; color:#f59e0b;">0</div>
    </div>
  </div>

  <main id="categories"></main>

  <!-- BARRE INVITÉS -->
  <div id="invitesBar" style="
    background:#1e293b; border-top:1px solid #334155; padding:12px 20px;
    display:flex; gap:16px; align-items:center; justify-content:center; flex-wrap:wrap;
  ">
    <span style="font-size:.85rem; color:#94a3b8; font-weight:600;">👤 Dont invités :</span>
    <div style="display:flex; align-items:center; gap:8px;">
      <span style="font-size:.85rem; color:#f1f5f9;">Hommes</span>
      <button onclick="changeInvite('invitesH',-1)" style="width:32px;height:32px;border-radius:50%;background:#334155;color:#ef4444;font-size:1.2rem;font-weight:700;border:none;cursor:pointer;">−</button>
      <span id="invitesH-display" style="font-size:1.3rem;font-weight:800;color:#6366f1;min-width:28px;text-align:center;">0</span>
      <button onclick="changeInvite('invitesH',1)" style="width:32px;height:32px;border-radius:50%;background:#334155;color:#22c55e;font-size:1.2rem;font-weight:700;border:none;cursor:pointer;">+</button>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <span style="font-size:.85rem; color:#f1f5f9;">Femmes</span>
      <button onclick="changeInvite('invitesF',-1)" style="width:32px;height:32px;border-radius:50%;background:#334155;color:#ef4444;font-size:1.2rem;font-weight:700;border:none;cursor:pointer;">−</button>
      <span id="invitesF-display" style="font-size:1.3rem;font-weight:800;color:#6366f1;min-width:28px;text-align:center;">0</span>
      <button onclick="changeInvite('invitesF',1)" style="width:32px;height:32px;border-radius:50%;background:#334155;color:#22c55e;font-size:1.2rem;font-weight:700;border:none;cursor:pointer;">+</button>
    </div>
  </div>

  <footer>
    <button class="btn danger" onclick="confirmEnd()">🏁 Clôturer le dénombrement</button>
  </footer>
</div>

<div id="toast">+1</div>

<!-- MODAL EDIT COUNT -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2 id="editTitle">✎ Corriger le nombre</h2>
    <label>Nouvelle valeur</label>
    <input type="number" id="editValue" min="0" inputmode="numeric" style="font-size:1.6rem; text-align:center;">
    <div class="modal-actions">
      <button class="btn success" onclick="saveEdit()">Enregistrer</button>
      <button class="btn danger" onclick="setEditValue(0)">Remettre à 0</button>
      <button class="btn" onclick="closeModal('editModal')">Annuler</button>
    </div>
  </div>
</div>

<!-- MODAL CLOTURE -->
<div class="modal-overlay" id="endModal">
  <div class="modal">
    <h2>🏁 Clôturer le dénombrement</h2>
    <p>Récapitulatif du jour :</p>
    <div id="recapList"></div>
    <div class="recap-total"><span>TOTAL</span><span id="recapTotal">0</span></div>
    <label>Heure de fin</label>
    <input type="time" id="heureFin">
    <label>Dirigeant du culte</label>
    <input type="text" id="dirigeant" placeholder="Nom du dirigeant">
    <label>Prédicateur</label>
    <input type="text" id="predicateur" placeholder="Nom du prédicateur">
    <label>Thème du message</label>
    <input type="text" id="themeMessage" placeholder="Ex: La foi qui déplace les montagnes">
    <label>Références bibliques</label>
    <input type="text" id="referencesBibliques" placeholder="Ex: Marc 11:22-24, Hébreux 11:1">
    <label>Observations (facultatif)</label>
    <textarea id="observations" placeholder="Ex: Beaucoup de visiteurs, retard dû à la pluie, fête organisée après le culte..."></textarea>
    <div class="modal-actions">
      <button class="btn success" onclick="doEndSession()">Confirmer & Clôturer</button>
      <button class="btn" onclick="closeModal('endModal')">Annuler</button>
    </div>
  </div>
</div>

function todayKey(){
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd}`;
}

function todayLabel(){
  return new Date().toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}

/* ================== INIT ================== */
window.onload = ()=>{
  document.getElementById('todayDate').textContent = todayLabel();
  document.getElementById('setupLogo').src = LOGO_DATA;
  document.getElementById('headerLogo').src = LOGO_DATA;
  sessionDateKey = todayKey();
  ensureCategoriesInit();
  checkSessionStatus();
};

let currentTab = 'culte'; // onglet actif

function switchTab(tab){
  currentTab = tab;
  document.getElementById('tab-culte').style.background = tab==='culte' ? '#6366f1' : '#1e293b';
  document.getElementById('tab-culte').style.color = tab==='culte' ? '#fff' : '#94a3b8';
  document.getElementById('tab-ecole').style.background = tab==='ecole' ? '#f59e0b' : '#1e293b';
  document.getElementById('tab-ecole').style.color = tab==='ecole' ? '#fff' : '#94a3b8';
  // Masquer/afficher la barre invités (seulement pour le culte)
  document.getElementById('invitesBar').style.display = tab==='culte' ? 'flex' : 'none';
  renderCategories();
}

function ensureCategoriesInit(){
  const catRef = db.ref(ROOT + "/categories");
  // Toutes les catégories à initialiser
  const allCats = [...DEFAULT_CATEGORIES.culte, ...DEFAULT_CATEGORIES.ecole];
  catRef.once("value").then(snap=>{
    const initObj = {};
    allCats.forEach((c,i)=> initObj[c.id] = {label:c.label, icon:c.icon, order:i, groupe:c.groupe});
    if(!snap.exists()){
      catRef.set(initObj);
    } else {
      const existing = snap.val();
      const updates = {};
      allCats.forEach((c,i)=>{
        updates[c.id] = {label:c.label, icon:c.icon, order:i, groupe:c.groupe};
      });
      catRef.update(updates);
    }
    catRef.on("value", s=>{
      categories = s.val() || {};
      if(document.getElementById('app').style.display!=='none') renderCategories();
    });
  });
}

function checkSessionStatus(){
  const ref = db.ref(`${ROOT}/days/${sessionDateKey}`);
  ref.once("value").then(snap=>{
    const data = snap.val();
    const statusEl = document.getElementById('sessionStatus');
    const btn = document.getElementById('actionBtn');
    if(data && data.status === 'open'){
      statusEl.innerHTML = `Dénombrement <span class="status-pill open">EN COURS</span> — rejoins le comptage.`;
      btn.textContent = "Rejoindre le dénombrement";
    } else if(data && data.status === 'closed'){
      statusEl.innerHTML = `Le dénombrement de ce jour est <span class="status-pill closed">CLÔTURÉ</span>.`;
      btn.textContent = "Démarrer un nouveau dénombrement";
    } else {
      statusEl.innerHTML = `Aucun dénombrement démarré aujourd'hui.`;
      btn.textContent = "▶ Commencer le dénombrement de la journée";
    }
  });
}

function handleMainAction(){
  postName = document.getElementById('postName').value.trim();
  if(!postName){ alert("Merci d'indiquer le nom du poste / agent."); return; }

  const ref = db.ref(`${ROOT}/days/${sessionDateKey}`);
  ref.once("value").then(snap=>{
    const data = snap.val();
    if(!data || data.status !== 'open'){
      const initCounts = {};
      Object.keys(categories).forEach(id=> initCounts[id]=0);
      ref.set({
        date: sessionDateKey,
        label: "Culte du " + new Date().toLocaleDateString('fr-FR'),
        status: "open",
        startedAt: Date.now(),
        startedBy: postName,
        counts: data && data.counts ? data.counts : initCounts,
        observations: data && data.observations ? data.observations : ""
      });
    }
    enterCountingScreen();
  });
}

function enterCountingScreen(){
  document.getElementById('postLabel').textContent = "Poste : " + postName;
  document.getElementById('setupScreen').style.display='none';
  document.getElementById('app').style.display='flex';

  db.ref(".info/connected").on("value", snap=>{
    document.getElementById('connStatus').classList.toggle('online', snap.val()===true);
  });

  db.ref(`${ROOT}/days/${sessionDateKey}/label`).on("value", snap=>{
    document.getElementById('serviceTitle').textContent = snap.val() || "Culte du jour";
  });

  renderCategories();
  listenCounts();
  listenInvites();
}

/* ================== CATEGORIES ================== */
function renderCategories(){
  const main = document.getElementById('categories');
  main.innerHTML = '';
  const sorted = Object.entries(categories)
    .filter(([id,cat])=> cat.groupe === currentTab)
    .sort((a,b)=>(a[1].order||0)-(b[1].order||0));
  sorted.forEach(([id,cat])=>{
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.onclick = (e)=>{ if(!e.target.classList.contains('minus')) increment(id); };
    card.innerHTML = `
      <div class="actions">
        <button class="edit" onclick="event.stopPropagation(); openEdit('${id}')">✎</button>
        <button class="minus" onclick="event.stopPropagation(); decrement('${id}')">−</button>
      </div>
      <div class="icon"><img src="${cat.icon||''}" alt="${cat.label}" onerror="this.style.display='none'"></div>
      <div class="label">${cat.label}</div>
      <div class="count" id="count-${id}">${counts[id]||0}</div>
    `;
    main.appendChild(card);
  });
}

/* ================== COMPTAGE ================== */
function listenCounts(){
  const ref = db.ref(`${ROOT}/days/${sessionDateKey}/counts`);
  ref.on("value", snap=>{
    counts = snap.val() || {};
    Object.keys(categories).forEach(id=>{
      const el = document.getElementById('count-'+id);
      if(el) el.textContent = counts[id]||0;
    });
    updateGrandTotal();
  });

  db.ref(`${ROOT}/days/${sessionDateKey}/status`).on("value", snap=>{
    if(snap.val() === 'closed' && document.getElementById('app').style.display!=='none'){
      alert("Le dénombrement de cette journée a été clôturé par un autre poste.");
      location.reload();
    }
  });
}

function updateGrandTotal(){
  const total = Object.values(counts).reduce((a,b)=>a+(b||0),0);
  document.getElementById('grandTotal').textContent = total;

  // Totaux par groupe
  const culteCats = Object.entries(categories).filter(([id,c])=>c.groupe==='culte').map(([id])=>id);
  const ecoleCats = Object.entries(categories).filter(([id,c])=>c.groupe==='ecole').map(([id])=>id);
  const totalCulte = culteCats.reduce((a,id)=>a+(counts[id]||0),0);
  const totalEcole = ecoleCats.reduce((a,id)=>a+(counts[id]||0),0);
  const elC = document.getElementById('totalCulte');
  const elE = document.getElementById('totalEcole');
  if(elC) elC.textContent = totalCulte;
  if(elE) elE.textContent = totalEcole;
}

function increment(catId){
  const ref = db.ref(`${ROOT}/days/${sessionDateKey}/counts/${catId}`);
  ref.transaction(v => (v||0)+1);
  db.ref(`${ROOT}/days/${sessionDateKey}/logs`).push({cat: catId, action:"+1", post: postName, ts: Date.now()});
  showToast("+1");
  if(navigator.vibrate) navigator.vibrate(40);
}

function decrement(catId){
  const ref = db.ref(`${ROOT}/days/${sessionDateKey}/counts/${catId}`);
  ref.transaction(v => Math.max((v||0)-1, 0));
  db.ref(`${ROOT}/days/${sessionDateKey}/logs`).push({cat: catId, action:"-1", post: postName, ts: Date.now()});
  showToast("-1");
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = msg==="-1" ? "var(--red)" : "var(--green)";
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=> t.classList.remove('show'), 600);
}

/* ================== INVITÉS ================== */
function changeInvite(field, delta){
  const ref = db.ref(`${ROOT}/days/${sessionDateKey}/${field}`);
  ref.transaction(v => Math.max((v||0)+delta, 0));
}

function listenInvites(){
  ['invitesH','invitesF'].forEach(field=>{
    db.ref(`${ROOT}/days/${sessionDateKey}/${field}`).on("value", snap=>{
      const val = snap.val() || 0;
      const el = document.getElementById(field+'-display');
      if(el) el.textContent = val;
    });
  });
}

/* ================== EDITION MANUELLE ================== */
let editingCatId = null;

function openEdit(catId){
  editingCatId = catId;
  const cat = categories[catId];
  document.getElementById('editTitle').textContent = `✎ Corriger : ${cat.label}`;
  document.getElementById('editValue').value = counts[catId] || 0;
  document.getElementById('editModal').classList.add('show');
}

function setEditValue(v){
  document.getElementById('editValue').value = v;
}

function saveEdit(){
  let val = parseInt(document.getElementById('editValue').value);
  if(isNaN(val) || val < 0) val = 0;
  const ref = db.ref(`${ROOT}/days/${sessionDateKey}/counts/${editingCatId}`);
  ref.set(val);
  db.ref(`${ROOT}/days/${sessionDateKey}/logs`).push({cat: editingCatId, action:"correction->"+val, post: postName, ts: Date.now()});
  closeModal('editModal');
}

/* ================== CLOTURE ================== */
function confirmEnd(){
  const list = document.getElementById('recapList');
  list.innerHTML = '';
  let total = 0;

  // Section Culte Principal
  const hCulte = document.createElement('div');
  hCulte.innerHTML = '<p style="color:#6366f1;font-weight:700;font-size:.8rem;text-transform:uppercase;padding:6px 0 2px;">⛪ Culte Principal</p>';
  list.appendChild(hCulte);
  Object.entries(categories).filter(([,c])=>c.groupe==='culte').sort((a,b)=>(a[1].order||0)-(b[1].order||0)).forEach(([id,cat])=>{
    const c = counts[id]||0; total += c;
    const row = document.createElement('div'); row.className = 'recap-row';
    row.innerHTML = `<span>${cat.label}</span><b>${c}</b>`; list.appendChild(row);
  });

  // Section École du Dimanche
  const hEcole = document.createElement('div');
  hEcole.innerHTML = '<p style="color:#f59e0b;font-weight:700;font-size:.8rem;text-transform:uppercase;padding:10px 0 2px;">📚 École du Dimanche</p>';
  list.appendChild(hEcole);
  Object.entries(categories).filter(([,c])=>c.groupe==='ecole').sort((a,b)=>(a[1].order||0)-(b[1].order||0)).forEach(([id,cat])=>{
    const c = counts[id]||0; total += c;
    const row = document.createElement('div'); row.className = 'recap-row';
    row.innerHTML = `<span>${cat.label}</span><b>${c}</b>`; list.appendChild(row);
  });
  document.getElementById('recapTotal').textContent = total;

  db.ref(`${ROOT}/days/${sessionDateKey}`).once("value").then(snap=>{
    const data = snap.val() || {};
    document.getElementById('observations').value = data.observations || '';
    document.getElementById('heureFin').value = data.heureFin || new Date().toTimeString().slice(0,5);
    document.getElementById('dirigeant').value = data.dirigeant || '';
    document.getElementById('predicateur').value = data.predicateur || '';
    document.getElementById('themeMessage').value = data.themeMessage || '';
  });

  document.getElementById('endModal').classList.add('show');
}

function doEndSession(){

  const obs = document.getElementById('observations').value.trim();
  const heureFin = document.getElementById('heureFin').value;
  const dirigeant = document.getElementById('dirigeant').value.trim();
  const predicateur = document.getElementById('predicateur').value.trim();
  const themeMessage = document.getElementById('themeMessage').value.trim();
  const referencesBibliques = document.getElementById('referencesBibliques').value.trim();
  const invitesH = parseInt(document.getElementById('invitesH-display').textContent) || 0;
  const invitesF = parseInt(document.getElementById('invitesF-display').textContent) || 0;
  const total = Object.values(counts).reduce((a,b)=>a+(b||0),0);

  db.ref(`${ROOT}/days/${sessionDateKey}`).update({
    status: "closed",
    endedAt: Date.now(),
    endedBy: postName,
    observations: obs,
    heureFin: heureFin,
    dirigeant: dirigeant,
    predicateur: predicateur,
    themeMessage: themeMessage,
    referencesBibliques: referencesBibliques,
    invitesH: invitesH,
    invitesF: invitesF,
    total: total
  });

  closeModal('endModal');
  alert("✅ Dénombrement clôturé. Merci !");
  location.reload();
}

/* ================== UTILS ================== */
function closeModal(id){ document.getElementById(id).classList.remove('show'); }
</script>
</body>
